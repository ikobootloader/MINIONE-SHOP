<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collection - Mininione Shop</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="banner">
    Livraison offerte dès 59 € • Nouvelle collection bohème chic
  </div>

  <header class="header">
    <div class="header-content">
      <button class="menu-toggle" id="menuToggle" aria-label="Menu">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <nav class="nav-desktop">
        <a href="collection.html">Collection</a>
        <a href="collection.html?featured=1">Nouveautés</a>
        <a href="collection.html?category=Robes">Robes</a>
        <a href="index.html#lookbook">Lookbook</a>
      </nav>
      <a href="index.html" class="logo">
        <div class="logo-main">Mininione</div>
        <div class="logo-sub">shop</div>
      </a>
      <div class="header-icons">
        <button id="searchBtn" aria-label="Rechercher"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
        <button id="wishlistBtn" aria-label="Favoris"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></button>
        <a href="cart.html" id="cartBtn" aria-label="Panier" class="cart-link"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span id="cartCount" class="cart-count">0</span></a>
      </div>
    </div>
    <nav class="nav-mobile" id="navMobile">
      <a href="collection.html">Collection</a>
      <a href="collection.html?featured=1">Nouveautés</a>
      <a href="collection.html?category=Robes">Robes</a>
      <a href="index.html#lookbook">Lookbook</a>
    </nav>
  </header>

  <div id="searchModal" class="modal">
    <div class="modal-content">
      <button class="modal-close" id="searchClose">&times;</button>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Rechercher un produit...">
        <button id="searchSubmit">Rechercher</button>
      </div>
    </div>
  </div>

  <main class="collection-page">
    <div class="collection-header">
      <h1 id="pageTitle">Collection</h1>
      <div class="collection-actions">
        <button id="filterToggle" class="btn-filter" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
          Filtres
        </button>
        <select id="sortSelect" class="sort-select">
          <option value="">Trier par</option>
          <option value="name">Nom A-Z</option>
          <option value="price_asc">Prix croissant</option>
          <option value="price_desc">Prix décroissant</option>
          <option value="newest">Plus récent</option>
        </select>
      </div>
    </div>

    <div class="collection-container">
      <aside class="filters-sidebar" id="filtersSidebar">
        <div class="filters-header">
          <h3>Filtres</h3>
          <button id="clearFilters" class="btn-text" type="button">Réinitialiser</button>
        </div>

        <div class="filter-group">
          <h4>Catégorie</h4>
          <div id="categoryFilters" class="filter-options"></div>
        </div>

        <div class="filter-group">
          <h4>Sous-catégorie</h4>
          <div id="subcategoryFilters" class="filter-options"></div>
        </div>

        <div class="filter-group">
          <h4>Saison</h4>
          <div class="filter-options">
            <label><input type="checkbox" name="season" value="Été"> Été</label>
            <label><input type="checkbox" name="season" value="Hiver"> Hiver</label>
            <label><input type="checkbox" name="season" value="Printemps"> Printemps</label>
            <label><input type="checkbox" name="season" value="Automne"> Automne</label>
            <label><input type="checkbox" name="season" value="Toutes saisons"> Toutes saisons</label>
          </div>
        </div>

        <div class="filter-group">
          <h4>Prix</h4>
          <div class="price-range">
            <input type="number" id="minPrice" placeholder="Min" min="0" step="10">
            <span>-</span>
            <input type="number" id="maxPrice" placeholder="Max" min="0" step="10">
            <button id="applyPrice" class="btn-small" type="button">OK</button>
          </div>
        </div>
      </aside>

      <div class="collection-content">
        <div class="results-info">
          <p id="resultsCount">Chargement...</p>
        </div>
        <div class="products-grid" id="productsGrid">
          <div class="loading">Chargement des produits...</div>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <a href="index.html" class="logo">
      <div class="logo-main">Mininione</div>
      <div class="logo-sub">shop</div>
    </a>
    <p class="footer-tagline">Bohème • Chic • Féminin</p>
  </footer>

  <script src="data/products-data.js"></script>
  <script src="js/mock-api.js"></script>
  <script src="js/demo-notice.js"></script>
  <script src="js/app.js"></script>
  <script src="js/collection.js"></script>
</body>
</html>
